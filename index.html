<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BassLog Pro</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/2972/2972185.png">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        :root {
            --primary: #2ecc71;
            --background: #000000;
            --card-bg: #1a1a1a;
        }

        body { 
            background-color: var(--background); 
            margin: 0; 
            font-family: system-ui, -apple-system, sans-serif;
            color: white;
            overflow-x: hidden;
        }

        /* The Map Header */
        #map { 
            height: 35vh; 
            width: 100%;
            border-bottom: 2px solid var(--primary);
        }

        .app-content {
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }

        h2 { margin-bottom: 5px; color: var(--primary); font-weight: 800; letter-spacing: -1px; }
        #status { font-size: 0.8rem; margin-bottom: 20px; opacity: 0.8; }

        /* Card-style inputs */
        input, select {
            background-color: var(--card-bg) !important;
            border: 1px solid #333 !important;
            color: white !important;
            height: 55px !important;
            border-radius: 12px !important;
        }

        .weight-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }

        .weight-grid input {
            padding: 0 !important;
            text-align: center;
            font-weight: bold;
        }

        /* The Big Action Button */
        #saveBtn {
            background-color: var(--primary) !important;
            border: none !important;
            color: black !important;
            font-weight: 800 !important;
            height: 65px !important;
            border-radius: 16px !important;
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3);
            margin-top: 10px;
        }

        #saveBtn:active { transform: scale(0.98); }

        label { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: #888; margin-left: 5px; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="app-content">
        <h2 id="app-title">BASSLOG PRO</h2>
        <p id="status">🛰️ INITIALIZING GPS...</p>

        <form id="fishForm">
            <label>Current Catch</label>
            <input type="text" id="species" value="Largemouth Bass">

            <label>Tournament Bag (Lbs)</label>
            <div class="weight-grid">
                <input type="number" id="w1" step="0.01" placeholder="1">
                <input type="number" id="w2" step="0.01" placeholder="2">
                <input type="number" id="w3" step="0.01" placeholder="3">
                <input type="number" id="w4" step="0.01" placeholder="4">
                <input type="number" id="w5" step="0.01" placeholder="5">
            </div>

            <div class="grid">
                <div>
                    <label>Water Temp</label>
                    <input type="number" id="wTemp" placeholder="-- °F">
                </div>
                <div>
                    <label>Clarity</label>
                    <select id="clarity">
                        <option value="Clear">Clear</option>
                        <option value="Stained">Stained</option>
                        <option value="Muddy">Muddy</option>
                    </select>
                </div>
            </div>

            <button type="submit" id="saveBtn">SYNC TO CLOUD</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const SB_URL = 'https://haychxjquixxuryfkaul.supabase.co';
        const SB_KEY = 'YOUR_ANON_KEY_HERE'; // <--- PASTE YOUR KEY
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        const map = L.map('map', { zoomControl: false }).setView([44.3, -85.6], 7);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        
        let coords = null;
        let marker = null;

        function updatePosition(latlng, label) {
            coords = latlng;
            if (marker) marker.setLatLng(latlng);
            else marker = L.marker(latlng).addTo(map);
            document.getElementById('status').innerText = `📍 POSITION LOCKED: ${label}`;
        }

        map.locate({setView: true, watch: true, maxZoom: 16});
        map.on('locationfound', (e) => updatePosition(e.latlng, "GPS LIVE"));
        map.on('click', (e) => updatePosition(e.latlng, "MANUAL PIN"));

        document.getElementById('fishForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!coords) return alert("No GPS fix.");
            
            const btn = document.getElementById('saveBtn');
            btn.innerText = "SYNCING...";
            
            const weightArray = [
                parseFloat(document.getElementById('w1').value || 0),
                parseFloat(document.getElementById('w2').value || 0),
                parseFloat(document.getElementById('w3').value || 0),
                parseFloat(document.getElementById('w4').value || 0),
                parseFloat(document.getElementById('w5').value || 0)
            ];

            const { error } = await _supabase.from('reports').insert([{
                species: document.getElementById('species').value,
                weights: weightArray,
                water_temp: parseFloat(document.getElementById('wTemp').value),
                water_clarity: document.getElementById('clarity').value,
                location: `POINT(${coords.lng} ${coords.lat})`
            }]);

            if (error) alert(error.message);
            else {
                alert("RECORD SYNCED");
                document.getElementById('fishForm').reset();
            }
            btn.innerText = "SYNC TO CLOUD";
        });
    </script>
</body>
</html>
